<div class="effect-list-container">
  <div class="header">
    <h2>Gestion des Effets</h2>
    <div class="header-actions">
      <button type="button" (click)="exportEffectsToJson()" class="export-button" [disabled]="exporting">
        <span class="icon">📥</span>
        <span class="text">{{ exporting ? 'Export en cours...' : 'Exporter en JSON' }}</span>
      </button>
      <button type="button" (click)="addNewEffect()" class="add-effect-button">
        <span class="icon">+</span>
        <span class="text">Nouvel Effet</span>
      </button>
    </div>
  </div>

  <app-data-table
    [config]="tableConfig"
    [data]="effects"
    [loading]="loading"
    (actionClick)="onActionClick($event)"
    (rowClick)="onRowClick($event)"
    (selectionChange)="onSelectionChange($event)"
    (pageChange)="onPageChange($event)"
    (sortChange)="onSortChange($event)">
  </app-data-table>
</div>
