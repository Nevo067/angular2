<div class="page" *ngIf="!loading; else loadingTpl">
  <p class="breadcrumb">
    <a [routerLink]="['/effects', effectId, 'parameters']">← Retour aux paramètres de l'effet</a>
  </p>
  <h2>Paramètres — effet #{{ effectId }}, condition #{{ conditionId }}</h2>
  <app-parameter-editor
    [ownerType]="'condition'"
    [ownerId]="conditionId"
    [definitions]="definitions"
    [currentValues]="values"
    (save)="onSave($event)">
  </app-parameter-editor>
</div>

<ng-template #loadingTpl>
  <p>Chargement...</p>
</ng-template>
