<div class="condition-list-container">
  <div class="header">
    <h2>Gestion des Conditions</h2>
    <div class="header-actions">
      <button type="button" (click)="exportConditionsToJson()" class="export-button" [disabled]="exporting">
        <span class="icon">📥</span>
        <span class="text">{{ exporting ? 'Export en cours...' : 'Exporter en JSON' }}</span>
      </button>
      <button type="button" (click)="addNewCondition()" class="add-condition-button">
        <span class="icon">+</span>
        <span class="text">Nouvelle Condition</span>
      </button>
    </div>
  </div>

  <app-data-table
    [config]="tableConfig"
    [data]="conditions"
    [loading]="loading"
    (actionClick)="onActionClick($event)"
    (rowClick)="onRowClick($event)"
    (selectionChange)="onSelectionChange($event)"
    (pageChange)="onPageChange($event)"
    (sortChange)="onSortChange($event)">
    
    <ng-template #expandedRow let-row>
      <p class="hint-expanded">
        Utilisez <strong>Paramètres</strong> pour choisir quels paramètres la condition peut utiliser.
        Les <strong>valeurs</strong> par effet se saisissent dans <strong>Effets → Paramètres</strong>.
      </p>
    </ng-template>
  </app-data-table>
</div>
